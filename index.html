<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土地巡檢報告系統 - 2x3 分頁優化版</title>
    <style>
        /* 基礎樣式 */
        body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; padding: 15px; max-width: 1000px; margin: auto; color: #333; background-color: #f0f2f5; }
        .no-print { background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 18px; color: #1a73e8; border-left: 5px solid #1a73e8; padding-left: 10px; margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #555; }
        
        /* 輸入框與語音按鈕 */
        .input-with-voice { display: flex; gap: 8px; align-items: flex-start; }
        input[type="text"], input[type="date"], input[type="file"], select, textarea { 
            flex: 1; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; 
        }
        
        .voice-btn { 
            padding: 10px; background-color: #f8f9fa; border: 1px solid #ced4da; border-radius: 8px; 
            cursor: pointer; font-size: 20px; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .voice-btn.listening { background-color: #ff4d4f; color: white; animation: pulse 1.5s infinite; border-color: #ff4d4f; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .row-flex { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-flex > div { flex: 1; }
        #otherStatusWrapper { margin-top: 10px; display: none; background: #fffde7; padding: 10px; border-radius: 8px; border: 1px dashed #fbc02d; }

        /* 按鈕群組 */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button.action-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; }
        .add-btn { background-color: #1a73e8; }
        .print-btn { background-color: #34a853; }
        .clear-btn { background-color: #ea4335; }

        /* --- 報告預覽與列印架構 --- */
        #report-preview { background: white; padding: 10px; min-height: 200px; }
        .report-header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #333; padding-bottom: 10px; }
        .report-meta { display: flex; justify-content: space-around; margin-top: 10px; font-size: 14px; }

        /* 網格佈局：2欄 */
        .report-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        /* 每個案的容器 */
        .report-item {
            border: 1px solid #eee;
            padding: 10px;
            display: flex;
            flex-direction: column;
            page-break-inside: avoid; /* 強烈要求：不要從中間斷開分頁 */
            break-inside: avoid;
            background: #fff;
        }

        .item-img-box {
            width: 100%;
            height: 220px; /* 固定高度以維持 2x3 比例 */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            margin-bottom: 8px;
        }

        .item-img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .item-details { font-size: 13px; line-height: 1.4; }
        .item-lot { font-weight: bold; font-size: 14px; display: block; border-bottom: 1px solid #eee; margin-bottom: 4px; padding-bottom: 2px; }
        .item-status { color: #c53030; font-weight: bold; display: block; margin-bottom: 4px; }
        .item-remark { color: #666; font-style: italic; font-size: 12px; white-space: pre-wrap; word-break: break-all; }

        /* 列印調整 */
        @media print {
            .no-print { display: none; }
            body { padding: 0; background-color: white; }
            #report-preview { padding: 0; }
            .report-grid { gap: 10px; }
            .report-item { border: 1px solid #ccc; } /* 列印時邊框深一點點 */
            
            /* 強制每 6 個項目後的處理（可選） */
            /* 如果需要非常嚴格的 2x3，可以根據高度調整，但 avoid break 通常已足夠 */
        }
        @media (min-width: 600px) { .btn-group { flex-direction: row; } }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="form-group">
            <h2>📄 1. 報告基本資料</h2>
            <div class="form-group">
                <label>報告標題</label>
                <div class="input-with-voice">
                    <input type="text" id="reportTitle" placeholder="例如：新界北巡查報告" oninput="updateHeader()">
                    <button class="voice-btn" onclick="startVoice('reportTitle')">🎤</button>
                </div>
            </div>
            <div class="row-flex">
                <div>
                    <label>報告人</label>
                    <div class="input-with-voice">
                        <input type="text" id="inspector" placeholder="姓名" oninput="updateHeader()">
                        <button class="voice-btn" onclick="startVoice('inspector')">🎤</button>
                    </div>
                </div>
                <div>
                    <label>巡查日期</label>
                    <input type="date" id="reportDate" onchange="updateHeader()">
                </div>
            </div>
        </div>

        <div class="form-group">
            <h2>📝 2. 新增項目</h2>
            <label>拍照或選擇相片</label>
            <input type="file" id="imgInput" accept="image/*">
            
            <div class="form-group" style="margin-top:10px;">
                <label>地段編號 (DD Lot)</label>
                <div class="input-with-voice">
                    <input type="text" id="lotInput" placeholder="例如：Lot 123">
                    <button class="voice-btn" onclick="startVoice('lotInput')">🎤</button>
                </div>
            </div>

            <div class="row-flex">
                <div>
                    <label>土地狀況 (大類)</label>
                    <select id="mainStatus" onchange="updateSubStatus()">
                        <option value="已出租">已出租</option>
                        <option value="未出租">未出租</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div id="subStatusContainer">
                    <label>詳細分類</label>
                    <select id="subStatus"></select>
                </div>
            </div>
            
            <div id="otherStatusWrapper">
                <label>請輸入具體狀況：</label>
                <div class="input-with-voice">
                    <input type="text" id="otherStatusInput" placeholder="輸入狀況...">
                    <button class="voice-btn" onclick="startVoice('otherStatusInput')">🎤</button>
                </div>
            </div>

            <div style="margin-top: 10px;">
                <label>描述/備註</label>
                <div class="input-with-voice">
                    <textarea id="remarkInput" placeholder="更多現場細節..."></textarea>
                    <button class="voice-btn" onclick="startVoice('remarkInput')">🎤</button>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="action-btn add-btn" onclick="addEntry()">➕ 加入項目</button>
            <button class="action-btn print-btn" onclick="window.print()">🖨️ 生成 PDF 報告</button>
            <button class="action-btn clear-btn" onclick="clearAll()">🗑️ 重設全部</button>
        </div>
    </div>

    <!-- 報告正式預覽 -->
    <div id="report-preview">
        <div class="report-header">
            <h1 id="h_title">土地巡檢報告</h1>
            <div class="report-meta">
                <span id="h_name">報告人：-</span>
                <span id="h_date">日期：-</span>
            </div>
        </div>
        <div id="reportGrid" class="report-grid">
            <!-- 項目將動態插入此處 -->
        </div>
    </div>

    <script>
        let entries = [];
        const statusData = {
            "已出租": ["正常使用", "未有使用", "違規使用"],
            "未出租": ["正常空置", "被違規佔用"],
            "其他": []
        };

        window.onload = () => {
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
            updateSubStatus();
            updateHeader();
        };

        function startVoice(targetId) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("瀏覽器不支援語音。"); return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK';
            const btn = event.currentTarget;
            recognition.onstart = () => btn.classList.add('listening');
            recognition.onend = () => btn.classList.remove('listening');
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const field = document.getElementById(targetId);
                field.value = (field.value.trim() ? field.value + " " : "") + transcript;
                if (targetId === 'reportTitle' || targetId === 'inspector') updateHeader();
            };
            recognition.start();
        }

        function updateSubStatus() {
            const main = document.getElementById('mainStatus').value;
            const subSelect = document.getElementById('subStatus');
            const subContainer = document.getElementById('subStatusContainer');
            const otherWrapper = document.getElementById('otherStatusWrapper');
            subSelect.innerHTML = "";
            if (statusData[main].length > 0) {
                subContainer.style.visibility = "visible";
                statusData[main].forEach(opt => {
                    let el = document.createElement("option");
                    el.value = opt; el.innerText = opt;
                    subSelect.appendChild(el);
                });
                otherWrapper.style.display = "none";
            } else {
                subContainer.style.visibility = "hidden";
                otherWrapper.style.display = "block";
            }
        }

        function updateHeader() {
            document.getElementById('h_title').innerText = document.getElementById('reportTitle').value || "土地巡檢報告";
            document.getElementById('h_name').innerText = "報告人：" + (document.getElementById('inspector').value || "-");
            document.getElementById('h_date').innerText = "日期：" + document.getElementById('reportDate').value;
        }

        function addEntry() {
            const file = document.getElementById('imgInput').files[0];
            if (!file) return alert("請選取相片");

            const lot = document.getElementById('lotInput').value;
            const main = document.getElementById('mainStatus').value;
            const sub = document.getElementById('subStatus').value;
            const other = document.getElementById('otherStatusInput').value;
            const remark = document.getElementById('remarkInput').value;

            let finalStatus = (main === "其他") ? `其他: ${other || "未註明"}` : `${main} - ${sub}`;

            const reader = new FileReader();
            reader.onload = (e) => {
                entries.push({ img: e.target.result, lot, status: finalStatus, remark });
                // 重置
                document.getElementById('imgInput').value = "";
                document.getElementById('lotInput').value = "";
                document.getElementById('otherStatusInput').value = "";
                document.getElementById('remarkInput').value = "";
                render();
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const grid = document.getElementById('reportGrid');
            grid.innerHTML = "";
            
            entries.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'report-item';
                itemDiv.innerHTML = `
                    <div class="item-img-box">
                        <img src="${item.img}">
                    </div>
                    <div class="item-details">
                        <span class="item-lot">地段：${item.lot || "N/A"}</span>
                        <span class="item-status">狀況：${item.status}</span>
                        ${item.remark ? `<div class="item-remark">備註：${item.remark}</div>` : ""}
                    </div>
                `;
                grid.appendChild(itemDiv);
            });
        }

        function clearAll() {
            if(confirm("確定清空數據嗎？")) { entries = []; render(); }
        }
    </script>
</body>
</html>
